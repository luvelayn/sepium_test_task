<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>Sepium Test Task</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.css"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.arrows.css"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.dots.css"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.autoplay.css" />
    <link rel="stylesheet" href="./fonts/fonts.css"/>
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/globals.css"/>
    <link rel="stylesheet" href="./styles/style.css"/>
</head>
<body class="page">
<main>
    <section class="products">
        <ul class="products__list"></ul>
    </section>
</main>

<template id="card-template">
    <li class="products__item card">
        <div class="card__slider">
            <div class="f-carousel card__carousel">
            </div>
            <div class="card__description"></div>
            <button class="card__zoom-button">
                <svg width="24" height="24">
                    <use xlink:href="/images/sprite.svg#resize"></use>
                </svg>
            </button>
        </div>

        <div class="card__content">
            <div class="card__block">
                <p class="card__text">Артикул<span class="space">—</span><span class="card__article"></span></p>
                <h2 class="card__title"></h2>
            </div>

            <div class="card__block">
                <p class="card__text">Варианты материалов</p>
                <ul class="card__materials"></ul>
            </div>

            <div class="card__block card__block_price">
                <div>
                    <p class="card__text">Цена от</p>
                    <p class="card__price"><span></span> ₽</p>
                    <p class="card__text">Погонный метр от<span class="space">—</span><span
                            class="card__price-linear"><span></span> ₽</span></p>
                </div>
                <button class="card__buy-button">Заказать</button>
            </div>

            <div class="card__footer">
                <button class="card__like-button">
                    <svg class="card__line-icon" width="22" height="22">
                        <use xlink:href="/images/sprite.svg#like"></use>
                    </svg>
                    <span class="card__like-counter"></span>
                </button>
                <a class="card__price-link card__text" href="/calc" target="_blank">
                    Рассчитать стоимость
                    <svg width="12" height="12">
                        <use xlink:href="/images/sprite.svg#arrow"></use>
                    </svg>
                </a>
            </div>
        </div>
    </li>
</template>

<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.lazyload.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.arrows.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.dots.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.autoplay.umd.js"></script>
<script type="module" src="scripts/index.js"></script>
</body>
</html>
